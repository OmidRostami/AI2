<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>

  <!-- SVG Favicon with "AI" text -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'>
    <defs>
      <linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>
        <stop offset='0%25' stop-color='%236c63ff'/>
        <stop offset='100%25' stop-color='%2300c2ff'/>
      </linearGradient>
    </defs>
    <rect width='64' height='64' rx='14' fill='url(%23g)'/>
    <text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle'
      font-family='system-ui, sans-serif' font-size='28' font-weight='800'
      letter-spacing='-1' fill='white'>AI</text>
  </svg>">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: system-ui, sans-serif;
      color: white;
    }

    .card {
      text-align: center;
      padding: 3rem 4rem;
      border-radius: 24px;
      background: #1a1a24;
      border: 1px solid #2a2a38;
      box-shadow: 0 0 60px rgba(108, 99, 255, 0.15);
    }

    /* Inline SVG icon displayed on the page */
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      display: block;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6c63ff, #00c2ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      margin-top: 0.6rem;
      color: #888;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Same SVG rendered visibly on the page -->
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#6c63ff"/>
          <stop offset="100%" stop-color="#00c2ff"/>
        </linearGradient>
      </defs>
      <rect width="64" height="64" rx="14" fill="url(#grad)"/>
      <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
        font-family="system-ui, sans-serif" font-size="28" font-weight="800"
        letter-spacing="-1" fill="white">AI</text>
    </svg>

    <h1>Hello, World!</h1>
    <p>SVG favicon with inline "AI" icon</p>
  </div>

</body>
</html>
