<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Internet Check</title>
</head>
<body>
  <h1 id="status">checking...</h1>
  <script>
    const el = document.getElementById('status');

    function check() {
      const xhr = new XMLHttpRequest();
      xhr.open('GET', location.href + '?t=' + Date.now(), true);
      xhr.timeout = 3000;
      xhr.onload  = () => set(true);
      xhr.onerror = () => set(false);
      xhr.ontimeout = () => set(false);
      xhr.send();
    }

    function set(on) {
      el.textContent = on ? 'connected' : 'disconnected';
      el.style.color = on ? 'green' : 'red';
    }

    check();
    setInterval(check, 3000);
  </script>
</body>
</html>
